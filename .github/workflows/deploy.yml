name: Deploy Rowan static site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Add host to known_hosts
        run: |
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Create target directory
        run: |
          ssh -i ~/.ssh/id_deploy \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            'mkdir -p /home/ubuntu/sites/rowan'

      - name: Copy site files
        run: |
          scp -i ~/.ssh/id_deploy index.html \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/sites/rowan/index.html

          scp -i ~/.ssh/id_deploy data.json \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/sites/rowan/data.json

      - name: Reload nginx
        run: |
          ssh -i ~/.ssh/id_deploy \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            'cd /home/ubuntu/madebyphil-home && docker compose exec nginx nginx -s reload'